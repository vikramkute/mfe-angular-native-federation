<section class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-3" aria-label="Key statistics">
  @for (card of cards(); track card.title) {
    <article class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h2 class="text-sm font-medium text-slate-600">{{ card.title }}</h2>
      <p class="mt-2 text-3xl font-semibold text-slate-900">{{ card.value }}</p>
      <p class="mt-3 text-sm text-slate-500">{{ card.trend }}</p>
    </article>
  }
</section>
