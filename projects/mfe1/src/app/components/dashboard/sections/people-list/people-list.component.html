<article class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm" aria-label="People list">
  <h2 class="text-lg font-semibold">People</h2>
  <ul class="mt-4 divide-y divide-slate-200">
    @for (person of people(); track person.name) {
      <li class="flex items-center gap-3 py-3">
        <span class="inline-flex size-10 items-center justify-center rounded-full bg-slate-200 text-sm font-medium" aria-hidden="true">
          {{ person.name.slice(0, 1) }}
        </span>
        <div>
          <p class="text-sm font-medium text-slate-900">{{ person.name }}</p>
          <p class="text-sm text-slate-500">{{ person.email }}</p>
        </div>
      </li>
    }
  </ul>
</article>
