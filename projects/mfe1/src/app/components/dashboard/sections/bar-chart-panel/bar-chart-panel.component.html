<article class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm" aria-label="Monthly bar chart panel">
  <h2 class="text-lg font-semibold">Bar chart</h2>
  <div class="mt-6 flex h-44 items-end gap-2" aria-hidden="true">
    @for (bar of bars(); track $index) {
      <div class="w-full rounded-t bg-slate-300" [style.height.px]="bar"></div>
    }
  </div>
  <div class="mt-3 grid grid-cols-6 gap-1 text-xs text-slate-500 md:grid-cols-12">
    @for (month of months(); track month) {
      <span>{{ month }}</span>
    }
  </div>
</article>
