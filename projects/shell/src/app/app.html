<div class="flex min-h-screen bg-slate-50 text-slate-900">
	<aside class="w-64 border-r border-slate-200 bg-white p-6">
		<h1 class="text-lg font-semibold tracking-tight">
			<a routerLink="/" class="rounded-sm outline-none ring-blue-500/40 focus:ring-2">
				{{ title() }}
			</a>
		</h1>
		<nav class="mt-6 flex flex-col gap-2" aria-label="Main navigation">
			@for (remote of remotes; track remote.path) {
				<a
					[routerLink]="remote.path"
					routerLinkActive="bg-slate-100 text-slate-900"
					class="block rounded-md px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:text-slate-900"
				>
					{{ remote.name }}
				</a>
			}
		</nav>
	</aside>

	<main class="flex-1 p-6 md:p-8">
		<router-outlet />
	</main>
</div>
