<header class="mb-6">
  <div class="mb-4 flex items-center justify-between gap-4">
    <h2 class="text-3xl font-semibold tracking-tight text-slate-950">{{ heading() }}</h2>

    <div class="inline-flex rounded-lg bg-slate-100 p-1" role="group" aria-label="Issue view mode">
      <button type="button" class="rounded bg-white px-3 py-2 shadow-sm" aria-label="List view">
        <span aria-hidden="true">≣</span>
      </button>
      <button type="button" class="rounded px-3 py-2" aria-label="Grid view">
        <span aria-hidden="true">⊞</span>
      </button>
      <button type="button" class="rounded px-3 py-2" aria-label="Calendar view">
        <span aria-hidden="true">◫</span>
      </button>
    </div>
  </div>

  <div class="flex flex-wrap items-center gap-3">
    <label class="sr-only" for="ticket-search">Search tickets</label>
    <div class="flex h-10 min-w-[260px] flex-1 items-center gap-2 rounded-lg border border-slate-200 bg-white px-3">
      <span aria-hidden="true" class="text-slate-500">⌕</span>
      <input
        id="ticket-search"
        type="search"
        placeholder="Search tickets..."
        class="w-full border-none bg-transparent text-base text-slate-900 outline-none"
      />
    </div>

    <button
      type="button"
      class="flex h-10 items-center gap-2 rounded-lg border border-slate-200 bg-white px-4 text-base text-slate-700"
      aria-label="Open filters"
    >
      <span aria-hidden="true">▽</span>
      <span>Filter</span>
    </button>
  </div>
</header>
