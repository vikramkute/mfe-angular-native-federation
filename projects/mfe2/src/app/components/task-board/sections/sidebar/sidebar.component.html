<aside class="w-64 shrink-0 border-r border-slate-200 bg-white px-2 pb-4 pt-4" aria-label="Primary navigation">
  <h1 class="px-4 text-3xl font-semibold tracking-tight text-slate-950">{{ title() }}</h1>

  <nav class="mt-8">
    <ul class="space-y-1">
      @for (item of items(); track item.id) {
        <li>
          <button
            type="button"
            class="flex h-10 w-full items-center gap-4 rounded-lg px-4 text-left text-base font-medium text-slate-900"
            [class.bg-slate-100]="item.active"
            [attr.aria-current]="item.active ? 'page' : null"
          >
            <span class="size-5 rounded-full bg-slate-300" aria-hidden="true"></span>
            <span class="truncate">{{ item.label }}</span>
          </button>
        </li>
      }
    </ul>
  </nav>
</aside>
